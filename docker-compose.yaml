services:
  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - "16686:16686"   # Jaeger UI  →  http://localhost:16686
      - "4317:4317"     # OTLP gRPC (for direct app use if needed)
      - "4318:4318"     # OTLP HTTP (for direct app use if needed)

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4319:4317"     # OTLP gRPC (app → collector)
      - "4320:4318"     # OTLP HTTP (app → collector)
    depends_on:
      - jaeger

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      OTEL_SERVICE_NAME:              llm-agent-demo
      OTEL_EXPORTER_OTLP_ENDPOINT:   http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:   http/protobuf
      APP_ENV:                        demo
      # Set to "true" only for sampled debug sessions:
      OTEL_GENAI_CAPTURE_PAYLOADS:   "false"
    ports:
      - "8000:8000"     # App API  →  http://localhost:8000/docs
    depends_on:
      - otel-collector
